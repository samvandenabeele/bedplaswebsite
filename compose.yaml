services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bedplas
      POSTGRES_USER: bedplas
      POSTGRES_PASSWORD: bedplas
    volumes:
      - bedplas-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bedplas -d bedplas"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      tags:
        - ghcr.io/samvandenabeele/bedplaswebsite-backend:latest
    environment:
      DATABASE_URL: postgresql+psycopg2://bedplas:bedplas@db:5432/bedplas
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      AUTH_TOKEN_MAX_AGE: ${AUTH_TOKEN_MAX_AGE:-604800}
      CORS_ORIGINS: http://localhost:8080
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      tags:
        - ghcr.io/samvandenabeele/bedplaswebsite-frontend:latest
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  bedplas-postgres:
